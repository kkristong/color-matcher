<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Matcher</title>
<style>
/* ── Font ── */
@font-face {
  font-family: 'Huiwen Mincho';
  src: url('/font.ttf') format('truetype');
  src: url('/font.ttf') format('truetype'),
       url('https://cdn.jsdelivr.net/npm/@fontpkg/huiwen-mincho-gbk@1.0.0/%E6%B1%87%E6%96%87%E6%98%8E%E6%9C%9D%E4%BD%93GBK.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: block;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --text: #1a1a1a;
  --text-dim: #777777;
  --text-faint: #b0b0b0;
  --line: #ebebeb;
  --line-dark: #d5d5d5;
  --bg: #ffffff;
  --bg-hover: #f5f5f5;
  --font: 'Huiwen Mincho', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', serif;
  --radius: 2px;
}

html { background: var(--bg); }
body {
  font-family: var(--font);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  background: var(--bg);
}

.wrap { max-width: 720px; margin: 0 auto; padding: 0 32px; }

/* Header */
.header { padding: 140px 0 80px; text-align: center; }
.header h1 {
  font-size: 44px; font-weight: 700; letter-spacing: 0.16em;
  color: var(--text); text-transform: uppercase;
}

/* Search */
.search-stage { margin-bottom: 56px; }
.search-shell {
  display: flex; align-items: center;
  border: 1px solid var(--line-dark);
  transition: border-color 0.2s;
}
.search-shell:focus-within { border-color: var(--text); }

.search-shell input {
  flex: 1; background: none; border: none; outline: none;
  padding: 24px 28px; font-size: 20px; color: var(--text);
  font-family: var(--font); font-weight: 600;
}
.search-shell input::placeholder { color: var(--text-faint); font-family: var(--font); font-weight: 400; }
.search-shell input:disabled { opacity: 0.4; }

.search-btn {
  margin: 8px 12px 8px 0; padding: 13px 30px;
  background: #3a3a3a; border: none;
  color: #fff; font-size: 16px; font-family: var(--font); font-weight: 700;
  cursor: pointer; white-space: nowrap;
  transition: background 0.2s; text-transform: uppercase; letter-spacing: 0.08em;
}
.search-btn:hover:not(:disabled) { background: #1a1a1a; }
.search-btn:hover:not(:disabled) { opacity: 0.8; }
.search-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.search-hint {
  margin-top: 16px; font-size: 15px; color: var(--text-dim); font-weight: 600;
  text-align: center; letter-spacing: 0.04em;
}

/* Presets */
.chips { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-width: 480px; margin: 0 auto; }
.chip {
  padding: 11px 0; font-size: 14px; font-family: var(--font); font-weight: 600; text-align: center;
  background: var(--bg); border: 1px solid var(--line);
  color: var(--text-dim); cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chip:hover {
  background: var(--text); border-color: var(--text);
  color: #fff;
}
.chip:disabled { opacity: 0.3; cursor: not-allowed; }

/* Loading */
.loading-stage { padding: 72px 0; text-align: center; }
.loading-keyword {
  font-size: 22px; font-weight: 700; letter-spacing: 0.06em; font-family: var(--font);
  color: var(--text-faint); margin-bottom: 18px; word-break: break-word;
  animation: keywordReveal 2.4s ease-in-out infinite;
}
.loading-text { color: var(--text-dim); font-size: 17px; font-weight: 600; letter-spacing: 0.06em; font-family: var(--font); }
.loading-cursor { display: inline-block; animation: cursorBlink 0.8s step-end infinite; font-weight: 400; color: var(--text-faint); }

@keyframes keywordReveal {
  0%, 100% { color: var(--text-faint); }
  50% { color: var(--text); }
}
@keyframes cursorBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes cardIn { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
.fade-in { animation: fadeIn 0.4s ease-out; }
.slide-up { animation: slideUp 0.45s ease-out; }
.card-in { animation: cardIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) both; }

/* Palette */
.palette-stage { animation: slideUp 0.45s ease-out; }
.palette-meta { text-align: center; margin-bottom: 28px; }
.palette-meta h2 { font-size: 26px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.palette-meta .mood { margin-top: 10px; font-size: 16px; color: var(--text-dim); line-height: 1.6; letter-spacing: 0.04em; font-weight: 600; }

/* Color cards — flat, no gloss */
.card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }

.color-card {
  cursor: pointer; overflow: hidden;
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}
.color-card:nth-child(1) { animation-delay: 0s; }
.color-card:nth-child(2) { animation-delay: 0.06s; }
.color-card:nth-child(3) { animation-delay: 0.12s; }
.color-card:nth-child(4) { animation-delay: 0.18s; }
.color-card:nth-child(5) { animation-delay: 0.24s; }

.color-card:hover { transform: translateY(-2px); }
.color-card.picked { outline: 2px solid var(--text); outline-offset: 2px; }

.swatch {
  aspect-ratio: 2/3;
  display: flex; align-items: flex-end; justify-content: center;
  padding: 14px;
}
.copy-hint {
  opacity: 0; font-size: 14px; font-weight: 700; letter-spacing: 0.05em;
  transition: opacity 0.2s; font-family: var(--font);
  padding: 6px 18px;
}
.color-card:hover .copy-hint,
.color-card.picked .copy-hint { opacity: 1; }

.card-meta {
  padding: 12px 8px 14px; text-align: center;
  border: 1px solid var(--line); border-top: none;
}
.card-meta .cname { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta .chex { font-size: 15px; font-weight: 600; color: var(--text-faint); margin-top: 5px; text-transform: uppercase; }
.card-meta .crole {
  display: inline-block; margin-top: 7px; font-size: 12px; font-weight: 700;
  color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em;
}

/* Detail bar */
.detail-bar {
  margin-top: 16px; padding: 16px 20px;
  border: 1px solid var(--line);
  display: flex; align-items: center; gap: 16px;
  animation: slideUp 0.3s ease-out;
}
.detail-swatch { width: 56px; height: 56px; flex-shrink: 0; }
.detail-info { flex: 1; min-width: 0; }
.detail-info .dname { font-size: 17px; font-weight: 700; letter-spacing: 0.04em; }
.detail-info .drole { font-size: 15px; font-weight: 600; color: var(--text-dim); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
.detail-vals { text-align: right; }
.detail-vals .dhex { font-size: 17px; font-weight: 700; text-transform: uppercase; }
.detail-vals .drgb { font-size: 15px; font-weight: 600; color: var(--text-faint); margin-top: 3px; }

/* Actions */
.actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
.act-btn {
  padding: 14px 0; font-size: 15px; font-family: var(--font); font-weight: 700; text-align: center;
  background: var(--bg); border: 1px solid var(--line-dark);
  color: var(--text-dim); cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.05em; text-transform: uppercase;
}
.act-btn:hover { background: var(--text); border-color: var(--text); color: #fff; }

/* Toast */
.toast-rack {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; gap: 6px; align-items: center;
  pointer-events: none;
}
.toast {
  padding: 11px 26px; background: var(--text); color: #fff;
  font-size: 13px; font-weight: 600; letter-spacing: 0.05em; font-family: var(--font);
  animation: slideUp 0.3s ease-out;
}

/* Error */
.error-box {
  padding: 14px 20px; background: #fef2f2; border: 1px solid #fecaca;
  color: #991b1b; font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 20px;
  animation: fadeIn 0.4s ease-out; letter-spacing: 0.04em;
}

/* Section label */
.sec-label {
  font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--text-faint); text-align: center; margin-bottom: 20px;
}

/* Footer */
.footer {
  text-align: center; padding: 56px 0 44px;
  color: var(--text-faint); font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
}

/* ═══════ Card View ═══════ */
.view-toggle { display: flex; gap: 0; justify-content: center; margin-bottom: 20px; }
.view-toggle button {
  padding: 9px 20px; font-size: 13px; font-family: var(--font); font-weight: 600;
  background: var(--bg); border: 1px solid var(--line-dark); cursor: pointer;
  color: var(--text-faint); transition: all 0.2s; letter-spacing: 0.05em;
}
.view-toggle button:first-child { border-right: none; }
.view-toggle button.active { background: var(--text); color: #fff; border-color: var(--text); }
.view-toggle button:hover:not(.active) { color: var(--text); }

.color-card-render {
  max-width: 400px; margin: 0 auto;
  background: #fff; box-shadow: 0 2px 24px rgba(0,0,0,0.08);
  padding: 32px 28px 24px;
}
.card-stripe { display: flex; align-items: center; padding: 0 16px; height: 52px; margin-bottom: 6px; }
.card-stripe:last-of-type { margin-bottom: 0; }
.card-stripe .stripe-swatch { width: 28px; height: 28px; flex-shrink: 0; margin-right: 14px; }
.card-stripe .stripe-name { flex: 1; font-size: 13px; font-weight: 700; letter-spacing: 0.05em; }
.card-stripe .stripe-hex { font-size: 13px; color: var(--text-faint); letter-spacing: 0.05em; }
.card-title { text-align: center; margin-bottom: 28px; }
.card-title .ct-name { font-size: 16px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.card-title .ct-mood { font-size: 11px; color: var(--text-faint); margin-top: 6px; letter-spacing: 0.06em; }
.card-footer { text-align: center; margin-top: 20px; font-size: 10px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; }

.export-row { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
.export-btn {
  padding: 11px 24px; font-size: 13px; font-family: var(--font); font-weight: 700;
  background: var(--text); border: none; color: #fff; cursor: pointer;
  transition: opacity 0.2s; letter-spacing: 0.06em; text-transform: uppercase;
}
.export-btn:hover { opacity: 0.8; }

/* ═══════ History ═══════ */
.history-stage { margin-top: 48px; }
.history-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 520px; margin: 0 auto; }
.history-item { cursor: pointer; transition: transform 0.2s; text-align: center; }
.history-item:hover { transform: translateY(-2px); }
.history-dot { display: flex; gap: 2px; height: 32px; width: 100%; }
.history-dot span { flex: 1; }
.history-label { font-size: 10px; color: var(--text-faint); text-align: center; margin-top: 5px; letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }

@media (max-width: 640px) {
  .header { padding: 44px 0 32px; }
  .header h1 { font-size: 18px; }
  .search-shell { flex-direction: column; }
  .search-btn { margin: 0 6px 8px; width: calc(100% - 12px); }
  .card-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .color-card:nth-child(4), .color-card:nth-child(5) { animation-delay: 0.05s; }
  .palette-meta h2 { font-size: 16px; }
}
</style>
</head>
<body>

<div class="toast-rack" id="toasts"></div>

<div class="wrap">

  <header class="header fade-in">
    <h1>Color Matcher</h1>
  </header>

  <!-- Key Setup -->
  <div id="keySetup" style="display:none; margin-bottom: 16px; animation: slideUp 0.4s ease-out;">
    <div class="search-shell">
      <input id="keyInput" type="password"
             placeholder="Paste your DeepSeek API key... (free at platform.deepseek.com)"
             autocomplete="off">
      <button class="search-btn" onclick="saveKey()" style="background:#777;">Save Key</button>
    </div>
  </div>

  <div class="search-stage slide-up">
    <div class="search-shell">
      <input id="searchInput" type="text"
             placeholder="Describe a Color Mood, Scene, or Emotion..."
             autocomplete="off">
      <button class="search-btn" id="searchBtn" onclick="doSearch()">Generate</button>
    </div>
  </div>

  <div id="errorBox" class="error-box" style="display:none"></div>

  <div id="loadingArea" class="loading-stage" style="display:none">
    <div id="loadingKeyword" class="loading-keyword"></div>
    <p class="loading-text">Developing<span class="loading-cursor">_</span></p>
  </div>

  <div id="results" style="display:none"></div>

  <div style="margin-top: 64px;">
    <p class="sec-label" id="presetLabel">Keep Exploring</p>
    <div class="chips" id="presets"></div>
  </div>

  <!-- History -->
  <div class="history-stage" id="historyStage">
    <p class="sec-label">Recent Palettes</p>
    <div class="history-strip" id="historyStrip"></div>
  </div>

  <footer class="footer">kkristong@gmail.com</footer>
</div>

<script>
let currentPalette = null;

const $ = id => document.getElementById(id);
const searchInput = $('searchInput');
const searchBtn = $('searchBtn');
const errorBox = $('errorBox');
const loadingArea = $('loadingArea');
const results = $('results');
const presetsEl = $('presets');
const presetLabel = $('presetLabel');
const toastsEl = $('toasts');

searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
initKey();
fetchPresets();

/* ── API Key Management ── */
function getKey() { return localStorage.getItem('cm-key') || ''; }
function initKey() {
  if (!getKey()) { $('keySetup').style.display = 'block'; }
  $('keyInput').addEventListener('keydown', e => { if (e.key === 'Enter') saveKey(); });
}
function saveKey() {
  const val = $('keyInput').value.trim();
  if (!val) return;
  localStorage.setItem('cm-key', val);
  $('keySetup').style.display = 'none';
  toast('Key Saved');
  $('searchInput').focus();
}

async function fetchPresets() {
  const fallback = [
    {label:'Golden Hour', q:'sunset calm ocean warm golden hour tones'},
    {label:'Misty Pines', q:'misty pine forest at dawn fresh serene'},
    {label:'Cyberpunk Rain', q:'cyberpunk night city neon lights rain'},
    {label:'Maple Afternoon', q:'autumn maple forest afternoon cozy warm tones'},
    {label:'Cherry Bloom', q:'cherry blossoms spring soft pink white petals'},
    {label:'Ocean Abyss', q:'deep ocean abyss mysterious blue teal'},
    {label:'Desert Stars', q:'desert night sky stars warm sand cool blue'},
    {label:'Memphis Pop', q:'80s memphis design bold playful pastels'},
    {label:'Water Lilies', q:'Monet garden Giverny impressionist light pastels'},
    {label:'Boreal Glow', q:'aurora borealis arctic night ethereal green purple blue'},
    {label:'Cafe Nostalgia', q:'vintage coffee shop warm browns cream brass'},
    {label:'After Rain', q:'tea plantation after rain fresh greens dewdrops mist'},
    {label:'Concrete Dawn', q:'brutalist architecture at sunrise grey concrete warm light'},
    {label:'Jazz Lounge', q:'dim jazz bar midnight blue velvet gold accents smoke'},
    {label:'江南梅雨', q:'梅雨时节的江南小巷 青石板路 湿润的灰调'},
    {label:'侘寂美学', q:'wabi-sabi japanese tea room muted earth tones clay paper wood'},
    {label:'Tuscany Summer', q:'Italian countryside golden wheat cypress trees terracotta sun'},
    {label:'昭和レトロ', q:'showa era retro kissaten amber lighting wood paneling nostalgic sepia'},
    {label:'Santorini Blue', q:'Greek island whitewashed walls cobalt blue domes Aegean sea'},
    {label:'北平深秋', q:'老北京胡同里的深秋 灰砖墙 银杏黄 柿子红 鸽哨青'},
    {label:'Vaporwave', q:'synthwave 80s mall purple pink cyan chrome grid nostalgia'},
    {label:'Renaissance', q:'Italian renaissance painting chiaroscuro jewel tones gold leaf'},
  ];
  try {
    const res = await fetch('/api/presets');
    const data = await res.json();
    renderChips(data);
  } catch { renderChips(fallback); }
}

function renderChips(items) {
  // Shuffle and pick 10
  const shuffled = items.sort(() => Math.random() - 0.5).slice(0, 8);
  presetsEl.innerHTML = shuffled.map(p =>
    `<button class="chip" onclick="searchPreset('${p.q.replace(/'/g,"\\'")}')">${p.label}</button>`
  ).join('');
}

function searchPreset(q) { searchInput.value = q; doSearch(); }

async function doSearch() {
  const desc = searchInput.value.trim();
  if (!desc) return;

  errorBox.style.display = 'none';
  results.style.display = 'none';
  loadingArea.style.display = 'block';
  $('loadingKeyword').textContent = desc;
  searchBtn.disabled = true;
  searchInput.disabled = true;

  try {
    const res = await fetch('/api/generate-colors', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({description: desc, api_key: getKey()}),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Generation Failed');
    currentPalette = data;
    renderPalette(data, desc);
    presetLabel.textContent = 'Keep Exploring';
  } catch (e) {
    errorBox.textContent = e.message;
    errorBox.style.display = 'block';
  } finally {
    loadingArea.style.display = 'none';
    searchBtn.disabled = false;
    searchInput.disabled = false;
    searchInput.focus();
  }
}

function renderPalette(p, queryText) {
  const title = queryText || p.paletteName;
  const cardHTML = `
    <div class="color-card-render">
      <div class="card-title">
        <div class="ct-name">${esc(title)}</div>
        <div class="ct-mood">${esc(p.mood)}</div>
      </div>
      ${p.colors.map(c => {
        const clr = textClr(c.hex);
        return `<div class="card-stripe" style="background:${c.hex}; color:${clr}">
          <div class="stripe-swatch"></div>
          <span class="stripe-name">${esc(c.name)}</span>
          <span class="stripe-hex" style="color:${clr === '#fff' ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.5)'}">${c.hex}</span>
        </div>`;
      }).join('')}
      <div class="card-footer">Color Matcher</div>
    </div>
    <div class="export-row">
      <button class="export-btn" onclick="downloadCard()">Download PNG</button>
    </div>`;

  results.innerHTML = `
    <div class="palette-stage">
      <div class="palette-meta">
        <h2>${esc(title)}</h2>
        <p class="mood">${esc(p.mood)}</p>
      </div>
      <div class="view-toggle">
        <button id="gridBtn" class="active" onclick="switchView('grid')">Grid</button>
        <button id="cardBtn" onclick="switchView('card')">Card</button>
      </div>
      <div id="gridView">
        <div class="card-grid">
          ${p.colors.map((c, i) => `
            <div class="color-card card-in" onclick="pickColor(${i})" id="card-${i}">
              <div class="swatch" style="background:${c.hex}">
                <span class="copy-hint" style="color:${textClr(c.hex)}; background:${textClr(c.hex) === '#fff' ? 'rgba(0,0,0,0.25)' : 'rgba(255,255,255,0.35)'}">
                  COPY
                </span>
              </div>
              <div class="card-meta">
                <div class="cname" title="${esc(c.name)}">${esc(c.name)}</div>
                <div class="chex">${c.hex}</div>
                <span class="crole">${esc(c.role)}</span>
              </div>
            </div>
          `).join('')}
        </div>
        <div id="detailBar"></div>
        <div class="actions">
          <button class="act-btn" onclick="copyAll()">Copy all color values</button>
          <button class="act-btn" onclick="exportCSS()">Export CSS variables</button>
        </div>
      </div>
      <div id="cardView" style="display:none">
        ${cardHTML}
      </div>
    </div>`;
  results.style.display = 'block';
  results.scrollIntoView({behavior:'smooth',block:'start'});
  saveHistory(p);
}

function pickColor(i) {
  if (!currentPalette) return;
  const c = currentPalette.colors[i];
  if (!c) return;

  currentPalette.colors.forEach((_, j) => {
    const el = document.getElementById(`card-${j}`);
    if (el) el.classList.toggle('picked', j === i);
  });

  copyText(c.hex, c.hex);

  const rgb = hexToRgb(c.hex);
  const bar = document.getElementById('detailBar');
  if (bar) {
    bar.innerHTML = `
      <div class="detail-bar">
        <div class="detail-swatch" style="background:${c.hex}"></div>
        <div class="detail-info">
          <div class="dname">${esc(c.name)}</div>
          <div class="drole">${esc(c.role)}</div>
        </div>
        <div class="detail-vals">
          <div class="dhex">${c.hex}</div>
          <div class="drgb">rgb(${rgb.r}, ${rgb.g}, ${rgb.b})</div>
        </div>
      </div>`;
  }
}

function copyAll() {
  if (!currentPalette) return;
  copyText(currentPalette.colors.map(c => c.hex).join(', '), 'All Color Values');
}

function exportCSS() {
  if (!currentPalette) return;
  const vars = currentPalette.colors.map(c =>
    `  --color-${c.role}: ${c.hex};  /* ${c.name} */`
  ).join('\n');
  copyText(`:root {\n${vars}\n}`, 'CSS variables');
}

function hexToRgb(h) { return {r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16)}; }
function textClr(h) { const {r,g,b}=hexToRgb(h); return (0.299*r+0.587*g+0.114*b)/255>.55?'#222':'#fff'; }
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

async function copyText(text, label) {
  try { await navigator.clipboard.writeText(text); }
  catch { const t=document.createElement('textarea'); t.value=text; t.style.cssText='position:fixed;opacity:0'; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); }
  toast(`Copied ` + label);
}

function toast(msg) {
  const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
  toastsEl.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(()=>el.remove(),300); }, 2000);
}

/* ── View Toggle ── */
function switchView(mode) {
  const gridEl = $('gridView');
  const cardEl = $('cardView');
  const gridBtn = $('gridBtn');
  const cardBtn = $('cardBtn');
  if (!gridEl || !cardEl) return;
  gridEl.style.display = mode === 'grid' ? 'block' : 'none';
  cardEl.style.display = mode === 'card' ? 'block' : 'none';
  gridBtn.classList.toggle('active', mode === 'grid');
  cardBtn.classList.toggle('active', mode === 'card');
}

/* ── Export PNG ── */
function downloadCard() {
  if (!currentPalette) return;
  const p = currentPalette;
  const title = searchInput.value || p.paletteName;
  const W = 800, H = 1200, pad = 60, stripeH = 106, gap = 8, topY = 140;

  const escSVG = s => { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };

  const stripesSVG = p.colors.map((c,i) => {
    const y = topY + 120 + i * (stripeH + gap);
    const clr = textClr(c.hex);
    return `<rect x="${pad}" y="${y}" width="${W-pad*2}" height="${stripeH}" fill="${c.hex}"/>
      <text x="${pad+28}" y="${y+stripeH/2+10}" font-family="serif" font-size="26" font-weight="bold" fill="${clr}">${escSVG(c.name)}</text>
      <text x="${W-pad-28}" y="${y+stripeH/2+10}" text-anchor="end" font-family="'Courier New', 'Menlo', 'Monaco', monospace" font-size="22" fill="${clr}" fill-opacity="${clr==='#ffffff'?'0.7':'0.5'}">${c.hex}</text>`;
  }).join('');

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
    <rect width="100%" height="100%" fill="#ffffff"/>
    <text x="${W/2}" y="${topY}" text-anchor="middle" font-family="serif" font-size="34" font-weight="bold" fill="#1a1a1a">${escSVG(title)}</text>
    <text x="${W/2}" y="${topY+42}" text-anchor="middle" font-family="serif" font-size="17" fill="#999">${escSVG(p.mood)}</text>
    ${stripesSVG}
    <text x="${W/2}" y="${H-30}" text-anchor="middle" font-family="serif" font-size="14" fill="#ccc">COLOR MATCHER</text>
  </svg>`;

  const blob = new Blob([svg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    canvas.getContext('2d').drawImage(img, 0, 0);
    canvas.toBlob(b => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = (p.paletteName||'palette').replace(/[^a-zA-Z0-9一-鿿]/g,'_')+'.png';
      a.click();
      toast('Downloaded PNG');
    });
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

/* ── History ── */
function saveHistory(p) {
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem('cm-history') || '[]'); } catch(e){}
  hist = hist.filter(h => h.paletteName !== p.paletteName);
  hist.unshift({paletteName:p.paletteName, mood:p.mood, colors:p.colors, time:Date.now()});
  if (hist.length > 8) hist = hist.slice(0, 8);
  localStorage.setItem('cm-history', JSON.stringify(hist));
  renderHistory();
}

function renderHistory() {
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem('cm-history') || '[]'); } catch(e){}
  if (!hist.length) { $('historyStage').style.display = 'none'; return; }
  $('historyStage').style.display = 'block';
  $('historyStrip').innerHTML = hist.map(h => `
    <div class="history-item" onclick="loadHistory('${esc(h.paletteName)}')" title="${esc(h.paletteName)}">
      <div class="history-dot">${h.colors.map(c => `<span style="background:${c.hex}"></span>`).join('')}</div>
      <div class="history-label">${esc(h.paletteName)}</div>
    </div>
  `).join('');
}

function loadHistory(name) {
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem('cm-history') || '[]'); } catch(e){}
  const found = hist.find(h => h.paletteName === name);
  if (found) {
    currentPalette = found;
    renderPalette(found, searchInput.value || found.paletteName);
    window.scrollTo({top: $('results').offsetTop - 40, behavior:'smooth'});
  }
}

// Init history on load
renderHistory();
</script>
